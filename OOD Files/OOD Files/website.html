<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Multi-Room Chat</title>
  <style>
    :root{
      --bg:#0b1220; --card:#0f1b33; --text:#e8eefc; --muted:#a8b3d6;
      --border:rgba(255,255,255,.10); --shadow:0 20px 60px rgba(0,0,0,.35);
      --accent:#6ea8ff; --accent2:#7c5cff; --good:#2ee59d; --bad:#ff5c7a; --warn:#ffcc66;
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:24px; min-height:100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(110,168,255,.18), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(124,92,255,.18), transparent 60%),
        var(--bg);
      display:flex; justify-content:center; align-items:center;
    }
    .shell{ width:min(1100px,100%); display:grid; grid-template-columns: 340px 1fr; gap:18px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); overflow:hidden;
    }
    .brand{ display:flex; gap:10px; padding:16px; border-bottom:1px solid var(--border); }
    .logo{ width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2)); }
    .brand h1{ margin:0; font-size:16px; }
    .brand p{ margin:2px 0 0; font-size:12px; color:var(--muted); }
    .panel{ padding:16px; }
    label{ font-size:12px; color:var(--muted); display:block; margin:12px 0 8px; }
    input{
      width:100%; padding:12px; border-radius:12px; border:1px solid var(--border);
      background: rgba(0,0,0,.18); color:var(--text); outline:none;
    }
    input:focus{ border-color: rgba(110,168,255,.55); box-shadow: 0 0 0 4px rgba(110,168,255,.14); }
    .row{ display:flex; gap:10px; margin-top:12px; }
    button{
      border:0; cursor:pointer; color:var(--text); font-weight:700;
      padding:11px 12px; border-radius:12px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow: 0 10px 25px rgba(124,92,255,.22);
    }
    button.secondary{
      background: rgba(255,255,255,.07); box-shadow:none; border:1px solid var(--border);
      font-weight:700;
    }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .status{ display:flex; align-items:center; gap:8px; margin-top:14px; font-size:12px; color:var(--muted); }
    .dot{ width:10px;height:10px;border-radius:999px;background:var(--warn); }
    .dot.good{ background:var(--good); } .dot.bad{ background:var(--bad); }

    .roomsHead{ display:flex; align-items:center; justify-content:space-between; margin-top:16px; }
    .roomsHead h3{ margin:0; font-size:13px; color:var(--text); }
    .rooms{ margin-top:10px; display:flex; flex-direction:column; gap:8px; }
    .roomBtn{
      width:100%; text-align:left;
      padding:10px 12px; border-radius:12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color:var(--text);
      display:flex; align-items:center; justify-content:space-between;
      cursor:pointer;
    }
    .roomBtn.active{
      border-color: rgba(110,168,255,.40);
      background: linear-gradient(135deg, rgba(110,168,255,.18), rgba(124,92,255,.14));
    }
    .badge{ font-size:12px; color:var(--muted); border:1px solid var(--border); padding:2px 8px; border-radius:999px; }

    .chatHead{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); }
    .chatHead h2{ margin:0; font-size:15px; }
    .chatHead .sub{ font-size:12px; color:var(--muted); margin-top:2px; }
    .messages{ height: 520px; overflow:auto; padding:16px; background: rgba(0,0,0,.12); }
    .msg{ max-width:78%; margin:8px 0; padding:10px 12px; border-radius:14px; border:1px solid var(--border); background: rgba(255,255,255,.05); white-space:pre-wrap; }
    .msg.me{ margin-left:auto; background: linear-gradient(135deg, rgba(110,168,255,.20), rgba(124,92,255,.18)); border-color: rgba(110,168,255,.30); }
    .msg.system{ max-width:100%; border-style:dashed; color:var(--muted); background: rgba(255,255,255,.03); }
    .meta{ font-size:11px; color:var(--muted); margin-bottom:4px; }
    .composer{ display:flex; gap:10px; padding:14px 16px; border-top:1px solid var(--border); background: rgba(0,0,0,.10); }
    .composer input{ flex:1; background: rgba(0,0,0,.22); }

    /* Friends */
    .friendsHead{ display:flex; align-items:center; justify-content:space-between; margin-top:18px; }
    .friendsHead h3{ margin:0; font-size:13px; }
    .friendsList{ margin-top:10px; display:flex; flex-direction:column; gap:8px; }
    .friendRow{
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 12px; border-radius:12px;
      border:1px solid var(--border); background: rgba(255,255,255,.04);
    }
    .friendLeft{ display:flex; align-items:center; gap:10px; min-width:0; }
    .pill{
      width:10px; height:10px; border-radius:999px; background: var(--bad);
      box-shadow: 0 0 0 4px rgba(255,92,122,.10);
      flex:0 0 auto;
    }
    .pill.on{ background: var(--good); box-shadow: 0 0 0 4px rgba(46,229,157,.10); }
    .friendName{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .friendActions button{
      padding:6px 10px; border-radius:10px; font-weight:700;
      background: rgba(255,255,255,.07); border:1px solid var(--border); box-shadow:none;
    }

    @media (max-width: 920px){ .shell{ grid-template-columns: 1fr; } .messages{ height: 420px; } }
  </style>
</head>
<body>
  <div class="shell">

    <!-- Left -->
    <section class="card">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Chat Rooms</h1>
          <p>Click a room to join/switch</p>
        </div>
      </div>

      <div class="panel">
        <label for="name">Your name</label>
        <input id="name" type="text" placeholder="e.g. Alex" />

        <label for="room">Create / join room</label>
        <input id="room" type="text" placeholder="e.g. Math101" />

        <div class="row">
          <button id="joinBtn">Join</button>
          <button id="refreshBtn" class="secondary">Refresh rooms</button>
        </div>

        <div class="status">
          <span id="dot" class="dot"></span>
          <span id="statusText">Connecting…</span>
        </div>

        <div class="roomsHead">
          <h3>Available rooms</h3>
          <span class="badge" id="roomsCount">0</span>
        </div>
        <div id="rooms" class="rooms"></div>

        <!-- Friends -->
        <div class="friendsHead">
          <h3>Friends</h3>
          <span class="badge" id="friendsCount">0</span>
        </div>

        <label for="friendInput">Add friend by name</label>
        <input id="friendInput" type="text" placeholder="e.g. Sam" />
        <div class="row">
          <button id="addFriendBtn">Add friend</button>
          <button id="whoBtn" class="secondary" title="Ask server who is online">Who’s online</button>
        </div>

        <div id="friends" class="friendsList"></div>
      </div>
    </section>

    <!-- Right -->
    <section class="card">
      <div class="chatHead">
        <div>
          <h2 id="roomTitle">Not in a room</h2>
          <div class="sub" id="roomSub">Join a room to start chatting.</div>
        </div>
        <button id="sendBtn" disabled>Send</button>
      </div>

      <div id="messages" class="messages"></div>

      <div class="composer">
        <input id="m" type="text" placeholder="Type message… (paste images too)" disabled />
      </div>
    </section>

  </div>

  <script>
    const roomsEl = document.getElementById("rooms");
    const roomsCountEl = document.getElementById("roomsCount");
    const messagesEl = document.getElementById("messages");
    const m = document.getElementById("m");
    const nameEl = document.getElementById("name");
    const roomEl = document.getElementById("room");
    const joinBtn = document.getElementById("joinBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const sendBtn = document.getElementById("sendBtn");
    const dot = document.getElementById("dot");
    const statusText = document.getElementById("statusText");
    const roomTitle = document.getElementById("roomTitle");
    const roomSub = document.getElementById("roomSub");

    // Friends UI
    const friendsEl = document.getElementById("friends");
    const friendsCountEl = document.getElementById("friendsCount");
    const friendInput = document.getElementById("friendInput");
    const addFriendBtn = document.getElementById("addFriendBtn");
    const whoBtn = document.getElementById("whoBtn");

    let connected = false;
    let currentRoom = null;

    // Presence state
    let onlineNames = new Set();

    // Remember per tab
    nameEl.value = localStorage.getItem("chat_name") || "";
    roomEl.value = localStorage.getItem("chat_room") || "";

    // Friends list persisted in localStorage
    function loadFriends(){
      try {
        const raw = localStorage.getItem("chat_friends");
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      } catch {
        return [];
      }
    }
    function saveFriends(arr){
      localStorage.setItem("chat_friends", JSON.stringify(arr));
    }

    // --- Fix 2 helpers: normalize + sanitize on load and after setting name ---
    const norm = s => (s ?? "").trim().toLowerCase();
    const myNameNorm = () => norm(nameEl.value || localStorage.getItem("chat_name") || "Anonymous");

    let friends = loadFriends();

    function sanitizeFriends(){
      const me = myNameNorm();
      const filtered = friends.filter(x => norm(x) !== me);
      if (filtered.length !== friends.length){
        friends = filtered;
        saveFriends(friends);
      }
    }

    sanitizeFriends();
    // --- end Fix 2 ---

    const ws = new WebSocket("ws://localhost:6790"); // <-- make sure this matches your server port!

    function setStatus(kind, text){
      dot.className = "dot" + (kind ? " " + kind : "");
      statusText.textContent = text;
    }

    function addMessage({type, room, name, text, isMe=false}){
      const div = document.createElement("div");
      div.className = "msg" + (type === "system" ? " system" : "") + (isMe ? " me" : "");

      const meta = document.createElement("div");
      meta.className = "meta";
      const time = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
      if(type === "system") meta.textContent = `${time} • system`;
      else meta.textContent = `${time} • ${room} • ${name}`;

      const body = document.createElement("div");
      body.textContent = text ?? "";

      div.appendChild(meta);
      div.appendChild(body);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addImageMessage({ room, name, dataUrl, isMe }) {
      const div = document.createElement("div");
      div.className = "msg" + (isMe ? " me" : "");

      const meta = document.createElement("div");
      meta.className = "meta";
      const time = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
      meta.textContent = `${time} • ${room} • ${name}`;

      const img = document.createElement("img");
      img.src = dataUrl;
      img.alt = "pasted image";
      img.style.maxWidth = "100%";
      img.style.borderRadius = "12px";
      img.style.border = "1px solid rgba(255,255,255,.10)";
      img.style.display = "block";

      div.appendChild(meta);
      div.appendChild(img);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function enableChatUI(enabled){
      m.disabled = !enabled;
      sendBtn.disabled = !enabled;
      if(enabled) m.focus();
    }

    function requestRooms(){
      if(!connected) return;
      ws.send(JSON.stringify({type:"list"}));
    }

    function requestPresence(){
      if(!connected) return;
      ws.send(JSON.stringify({type:"who"}));
    }

    function renderRooms(list){
      roomsEl.innerHTML = "";
      roomsCountEl.textContent = String(list.length);

      if(list.length === 0){
        const empty = document.createElement("div");
        empty.className = "msg system";
        empty.style.maxWidth = "100%";
        empty.textContent = "No rooms found.";
        roomsEl.appendChild(empty);
        return;
      }

      for(const r of list){
        const btn = document.createElement("button");
        btn.className = "roomBtn" + (r.name === currentRoom ? " active" : "");
        btn.type = "button";

        const left = document.createElement("span");
        left.textContent = r.name;

        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = `${r.count}`;

        btn.appendChild(left);
        btn.appendChild(badge);

        btn.addEventListener("click", () => {
          roomEl.value = r.name;
          joinRoom(r.name);
        });

        roomsEl.appendChild(btn);
      }
    }

    function renderFriends(){
      friendsEl.innerHTML = "";
      friendsCountEl.textContent = String(friends.length);

      if(friends.length === 0){
        const empty = document.createElement("div");
        empty.className = "msg system";
        empty.style.maxWidth = "100%";
        empty.textContent = "Add a friend name to see if they’re online.";
        friendsEl.appendChild(empty);
        return;
      }

      for(const fname of friends){
        const row = document.createElement("div");
        row.className = "friendRow";

        const left = document.createElement("div");
        left.className = "friendLeft";

        const pill = document.createElement("span");
        const online = onlineNames.has(fname);
        pill.className = "pill" + (online ? " on" : "");

        const nm = document.createElement("div");
        nm.className = "friendName";
        nm.textContent = fname;

        left.appendChild(pill);
        left.appendChild(nm);

        const actions = document.createElement("div");
        actions.className = "friendActions";

        const del = document.createElement("button");
        del.type = "button";
        del.textContent = "Remove";
        del.addEventListener("click", () => {
          friends = friends.filter(x => x !== fname);
          saveFriends(friends);
          renderFriends();
        });

        actions.appendChild(del);

        row.appendChild(left);
        row.appendChild(actions);
        friendsEl.appendChild(row);
      }
    }

    renderFriends();

    function joinRoom(roomOverride=null){
      if(!connected){
        addMessage({type:"system", text:"Not connected yet."});
        return;
      }
      const name = (nameEl.value || "Anonymous").trim() || "Anonymous";
      const room = (roomOverride ?? roomEl.value ?? "").trim();
      if(!room){
        addMessage({type:"system", text:"Room name cannot be empty."});
        roomEl.focus();
        return;
      }

      localStorage.setItem("chat_name", name);
      localStorage.setItem("chat_room", room);

      // --- Fix 2: remove self from stored friends after name is known ---
      sanitizeFriends();
      renderFriends();
      // --- end Fix 2 ---

      ws.send(JSON.stringify({type:"join", name, room}));

      currentRoom = room;
      roomTitle.textContent = `Room: ${room}`;
      roomSub.textContent = `Signed in as ${name}`;
      enableChatUI(true);

      messagesEl.innerHTML = "";
      addMessage({type:"system", text:`Switched to room: ${room}`});

      requestRooms();
      // Don't auto-spam "who" here — server should push presence anyway.
    }

    function sendMsg(){
      if(!connected){
        addMessage({type:"system", text:"Not connected."});
        return;
      }
      if(!currentRoom){
        addMessage({type:"system", text:"Join a room first."});
        return;
      }
      const text = m.value.trim();
      if(!text) return;

      const name = (nameEl.value || "Anonymous").trim() || "Anonymous";
      ws.send(JSON.stringify({type:"chat", name, text}));
      m.value = "";
      m.focus();
    }

    ws.onopen = () => {
      connected = true;
      setStatus("good", "Connected");
      addMessage({type:"system", text:"Connected to server."});
      requestRooms();
      requestPresence(); // one-time on connect is fine
    };

    ws.onclose = () => {
      connected = false;
      setStatus("bad", "Disconnected");
      addMessage({type:"system", text:"Disconnected from server."});
      enableChatUI(false);
      onlineNames = new Set();
      renderFriends();
    };

    ws.onerror = () => {
      setStatus("bad", "WebSocket error");
      addMessage({type:"system", text:"WebSocket error. Is server.py running?"});
      enableChatUI(false);
    };

    // ONE onmessage handler: rooms + system + chat + image + presence
    ws.onmessage = (e) => {
      try{
        const data = JSON.parse(e.data);

        if(data.type === "rooms"){
          renderRooms(data.rooms || []);
          return;
        }

        if(data.type === "presence"){
          onlineNames = new Set((data.online || []).map(String));
          renderFriends();
          return;
        }

        if(data.type === "system"){
          addMessage({type:"system", text: data.text || ""});
          // refresh rooms only; DO NOT call requestPresence() here
          requestRooms();
          return;
        }

        if(data.type === "chat"){
          const myName = (nameEl.value || "Anonymous").trim() || "Anonymous";
          const isMe = data.room === currentRoom && (data.name || "") === myName;
          addMessage({type:"chat", room:data.room, name:data.name, text:data.text, isMe});
          return;
        }

        if (data.type === "image") {
          const myName = (nameEl.value || "Anonymous").trim() || "Anonymous";
          const isMe = data.room === currentRoom && (data.name || "") === myName;
          addImageMessage({ room: data.room, name: data.name, dataUrl: data.dataUrl, isMe });
          return;
        }

        addMessage({type:"system", text:e.data});
      }catch{
        addMessage({type:"system", text:e.data});
      }
    };

    joinBtn.addEventListener("click", () => joinRoom());
    refreshBtn.addEventListener("click", requestRooms);
    sendBtn.addEventListener("click", sendMsg);
    whoBtn.addEventListener("click", requestPresence);

    m.addEventListener("keydown", (e) => { if(e.key === "Enter") sendMsg(); });

    addFriendBtn.addEventListener("click", () => {
      const f = friendInput.value.trim();
      if(!f) return;
      if(!friends.includes(f)) friends.push(f);
      friends.sort((a,b) => a.localeCompare(b));
      saveFriends(friends);
      friendInput.value = "";
      // --- Fix 2: in case they typed their own name, sanitize right away ---
      sanitizeFriends();
      renderFriends();
      // ---
      requestPresence();
    });

    friendInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") addFriendBtn.click();
    });

    // Paste image from clipboard
    document.addEventListener("paste", (event) => {
      if (!currentRoom) return;
      if (m.disabled) return;

      const items = event.clipboardData?.items;
      if (!items) return;

      for (const item of items) {
        if (item.type && item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (!file) continue;

          const reader = new FileReader();
          reader.onload = () => {
            const name = (nameEl.value || "Anonymous").trim() || "Anonymous";
            ws.send(JSON.stringify({
              type: "image",
              name,
              mime: file.type,
              dataUrl: reader.result
            }));
          };
          reader.readAsDataURL(file);

          event.preventDefault();
          break;
        }
      }
    });
  </script>
</body>
</html>
